<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="icon" href="./assets/branding/icon.png">

<body>

    <nav class="navbar">

        <div class="logo">
            <img src="./assets/branding/logo-navbar.png" class="navbar-logo">

            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="#contact">Contact</a>
        </div>

    <section class="contact-hero">

            <p>

                Have a question, suggestion, or feedback? I'd love to hear from you.

            </p>

        </div>

                    <p>your-email@example.com</p>

                </div>

                <div class="contact-card">

                    <div class="contact-icon">💼</div>

                    <h3>LinkedIn</h3>

                    <p>Coming Soon</p>

                </div>

                <div class="contact-card">

                    <div class="contact-icon">💻</div>

                    <h3>GitHub</h3>

                    <p>Coming Soon</p>

                </div>

                <div class="contact-card">

                    <div class="contact-icon">🌐</div>

                    <h3>Portfolio</h3>

                    <p>Coming Soon</p>

                </div>

            </div>

        </div>

    </section>
